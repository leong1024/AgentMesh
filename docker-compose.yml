services:
  research:
    build: .
    command:
      [
        "uvicorn",
        "agent_research.server:create_app",
        "--factory",
        "--host",
        "0.0.0.0",
        "--port",
        "8001",
      ]
    environment:
      RESEARCH_HOST: 0.0.0.0
      RESEARCH_PORT: "8001"
      RESEARCH_PUBLIC_URL: http://research:8001
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      RESEARCH_MODEL: ${RESEARCH_MODEL:-google_genai:gemma-4-31b-it}
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/.well-known/agent-card.json"]
      interval: 10s
      timeout: 5s
      retries: 5

  critic:
    build: .
    command:
      [
        "uvicorn",
        "agent_critic.server:create_app",
        "--factory",
        "--host",
        "0.0.0.0",
        "--port",
        "8002",
      ]
    environment:
      CRITIC_HOST: 0.0.0.0
      CRITIC_PORT: "8002"
      CRITIC_PUBLIC_URL: http://critic:8002
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      CRITIC_MODEL: ${CRITIC_MODEL:-google_genai:gemma-4-31b-it}
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/.well-known/agent-card.json"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    command:
      [
        "uvicorn",
        "orchestrator_agent.server:create_app",
        "--factory",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
      ]
    environment:
      RESEARCH_A2A_URL: http://research:8001
      CRITIC_A2A_URL: http://critic:8002
      ORCHESTRATOR_AGENT_MODEL: ${ORCHESTRATOR_AGENT_MODEL:-google_genai:gemma-4-31b-it}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      STATIC_DIR: /app/frontend/dist
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080
    ports:
      - "8080:8080"
    depends_on:
      research:
        condition: service_healthy
      critic:
        condition: service_healthy
